# OpenClaw Skill: Quicken Simplifi API
# https://docs.openclaw.ai/tools/creating-skills
name: quicken-simplifi
version: 1.0.0
author: simplifi
description: |
  Fetch accounts, transactions, tags, and categories from Quicken Simplifi.
  Analyze spending (by parent category, net value) and income (net value by
  category and month). Update and analyze net worth.
  Login with token or email/password; on macOS can read 2FA from iMessage.
license: MIT

permissions:
  - network
  - filesystem

config:
  token:
    type: string
    required: false
    description: "Quicken Simplifi OAuth token (skips MFA if provided)"
    secret: true
  email:
    type: string
    required: false
    description: "Simplifi account email (use with password for login)"
  password:
    type: string
    required: false
    description: "Simplifi account password"
    secret: true
  export_format:
    type: string
    required: false
    default: "json"
    description: "Export format: json or csv"
  export_filename:
    type: string
    required: false
    default: "simplifi_export"
    description: "Filename prefix for exported files"
  networth_update:
    type: boolean
    required: false
    default: false
    description: "If true, fetch latest balances from API and update net-worth file (append or overwrite today's row)"
  networth:
    type: boolean
    required: false
    default: false
    description: "If true, also run net-worth analysis on the long-format net-worth file"
  networth_file:
    type: string
    required: false
    description: "Path to long-format net-worth CSV (default data/networth_history.csv)"
  networth_from:
    type: string
    required: false
    description: "Start date for net-worth range (YYYY-MM-DD)"
  networth_to:
    type: string
    required: false
    description: "End date for net-worth range (YYYY-MM-DD)"
  networth_monthly:
    type: boolean
    required: false
    default: false
    description: "Show monthly net-worth summary (one row per month with all category values)"
  networth_quarterly:
    type: boolean
    required: false
    default: false
    description: "Show quarterly net-worth summary (one row per quarter with all category values)"
  networth_yearly:
    type: boolean
    required: false
    default: false
    description: "Show yearly net-worth summary (one row per year with all category values)"

entryPoint:
  type: shell
  path: skill/run.sh

triggers:
  keywords:
    - simplifi
    - quicken
    - transactions
    - export simplifi
    - simplifi accounts
    - net worth
    - networth
    - simplifi net worth
